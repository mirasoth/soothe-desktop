appId: dev.mirasurf.soothe-desktop
productName: Soothe
copyright: Copyright © 2026 Soothe Authors
asar: true

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/.{eslintrc,prettierrc}.*'

extraMetadata:
  main: out/main/index.js

extraResources:
  - from: "../../packages/soothe-daemon/dist/soothed"
    to: "daemon"
    filter:
      - "**/*"

afterPack: ./afterPack.cjs

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target: nsis

linux:
  target: AppImage
  category: Development
